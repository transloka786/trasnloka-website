name: Production website monitor

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  health-and-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public health endpoint
        run: curl --fail --show-error --silent --retry 3 "${SITE_URL}/api/health"
        env:
          SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
      - name: Run synthetic form-delivery test
        run: curl --fail --show-error --silent --retry 2 -X POST -H "Authorization: Bearer ${SYNTHETIC_TEST_SECRET}" "${SITE_URL}/api/synthetic"
        env:
          SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
          SYNTHETIC_TEST_SECRET: ${{ secrets.SYNTHETIC_TEST_SECRET }}
